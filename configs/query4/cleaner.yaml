broker:
  type: e-q
  input:
    exchange:
      name: e_q345_cleaner
      type: topic
      keys:
        - tx.usd
    queue:
      name: q_q4_cleaner
  output:
    queue:
      name: q_q4_router

worker:
  type: "Cleaner"
  params:
    field:
      - "paid"
  sync_eof:
    retries_base_delay: 0.5
    retries_step_delay: 0.5
    max_retries: 5
