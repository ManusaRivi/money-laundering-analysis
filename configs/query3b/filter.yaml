avg_broker:
  type: e-q
  input:
    exchange:
      name: e_q3_avg
      type: fanout
  output:
    queue:
      name: q_q3_avg_filter_sink

broker:
  type: q-q
  input:
    queue:
      name: q_q3_amount_filter
  output:
    queue:
      name: query_results
  lazy: true

worker:
  type: "AvgFormatFilter"
  params:
    multiplier: 0.01
  sync_eof:
    - retries_base_delay: 0.5
    - retries_step_delay: 0.5
    - max_retries: 5
