broker:
  type: e-e
  url: amqp://guest:guest@rabbitmq:5672/
  input: e_q345_filter
  input_queue: q_q3_router
  output: e_q3_agg
  exchange_type: topic
  output_exchange_type: direct
  input_keys:
    - tx.usd
  # El routing key lo decide el worker (RoutingKey en el broker.Message)
  prefetch: 300
  durable: true
  auto_delete: false
  exclusive: false
  no_wait: false
  internal: false

worker:
  type: "Router"
  params:
    field:
      origin: "Format"
  sync_eof:
    - retries_base_delay: 0.5
    - retries_step_delay: 0.5
    - max_retries: 5
