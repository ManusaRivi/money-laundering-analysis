broker:
  type: e-e
  url: amqp://guest:guest@rabbitmq:5672/
  input: e_entry
  input_queue: q_q345_filter # de input
  output: e_q345_cleaner 
  exchange_type: topic # de outpt
  input_keys: # de input
    - tx.*
  prefetch: 300 
  durable: true
  auto_delete: false
  exclusive: false
  no_wait: false
  internal: false

worker:
  type: "DateRangeFilter"
  params:
    type: "date_between"
    from: "2022/09/01 00:00"
    to: "2022/09/05 23:59"
  sync_eof:
    - retries_base_delay: 0.5
    - retries_step_delay: 0.5
    - max_retries: 5