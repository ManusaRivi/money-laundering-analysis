      prefetch: 100
      durable: true
      auto_delete: false
      exclusive: false
      no_wait: false
      internal: false
  output:
    queue:
      prefetch: 100
      durable: true
      auto_delete: false
      exclusive: false
      no_wait: false
      internal: false
