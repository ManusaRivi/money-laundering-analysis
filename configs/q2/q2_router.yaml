# q-e example (queue -> exchange)

broker:
  type: q-e
  url: amqp://guest:guest@rabbitmq:5672/
  input: q_q2_router
  output: e_q2_max
  exchange_type: direct
  # El routing key lo decide el worker (RoutingKey en el broker.Message)
  prefetch: 30
  durable: true
  auto_delete: false
  exclusive: false
  no_wait: false
  internal: false

worker:
  type: "Router"
  params:
    field:
      origin: "BankID"
