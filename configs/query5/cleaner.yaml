broker:
  type: e-q
  input:
    exchange:
      name: e_q345_cleaner
      type: topic
      keys:
        - tx.*
    queue:
      name: q_q5_cleaner
  output:
    queue:
      name: q_q5_format_filter

worker:
  type: "Cleaner"
  params:
    field:
      - "origin"
      - "dest"
  query: 5
  sync_eof:
    - retries_base_delay: 0.5
    - retries_step_delay: 0.5
    - max_retries: 5
