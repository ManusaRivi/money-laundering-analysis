# e-e example (exchange -> exchange)

broker:
  type: e-q
  url: amqp://guest:guest@rabbitmq:5672/
  input: e_q345_filter
  output: q_q5_format_filter
  exchange_type: topic
  input_keys:
    - tx.*
  prefetch: 300
  durable: true
  auto_delete: false
  exclusive: false
  no_wait: false
  internal: false

worker:
  type: "Cleaner"
  params:
    field:
      - "origin"
      - "dest"
  query: 5
  sync_eof:
    - retries_base_delay: 0.5
    - retries_step_delay: 0.5
    - max_retries: 5

# Required envs if input is omitted
# WORKER_PREFIX=agg
# ID=0
# NEXT_WORKER_PREFIX=join
