broker:
  type: q-q
  input:
    queue:
      name: q_q5_format_filter
  output:
    queue:
      name: q_q5_router

worker:
  type: "SyncFilter"
  params:
    type: format
    field: Format
    operator: "=="
    value_float: 0.0
    value_string:
      - "Wire"
      - "ACH"
  query: 5
  sync_eof:
    retries_base_delay: 0.5
    retries_step_delay: 0.5
    max_retries: 5
