# e-q example (exchange -> queue)

broker:
  type: e-q
  url: amqp://guest:guest@rabbitmq:5672/
  input: e_q5_converter
  output: q_q5_amount_filter
  exchange_type: direct
  # Optional override; otherwise built from WORKER_PREFIX/ID
  # input_keys:
  #   - agg_0
  prefetch: 300
  durable: true
  auto_delete: false
  exclusive: false
  no_wait: false
  internal: false

worker:
  type: "Converter"
  query: 5
  sync_eof:
    - retries_base_delay: 0.5
    - retries_step_delay: 0.5
    - max_retries: 5

# Required envs if input_keys are omitted
# WORKER_PREFIX=agg
# ID=0
# NEXT_WORKER_PREFIX=tx_2
