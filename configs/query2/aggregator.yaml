broker:
  type: e-q
  input:
    exchange:
      name: e_q2_max
      type: direct
    queue:
      name: q_q2_aggregator
  output:
    queue:
      name: q_q2_join

worker:
  type: "Aggregator"
  params:
    type: max
    field: Amount
    group:
      "origin": "BankID"
  sync_eof:
    retries_base_delay: 0.5
    retries_step_delay: 0.5
    max_retries: 5
