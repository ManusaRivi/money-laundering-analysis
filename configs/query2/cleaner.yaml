broker:
  type: e-q
  input:
    exchange:
      name: e_entry
      type: topic
      keys:
        - tx.usd
    queue:
      name: q_q2_cleaner
  output:
    queue:
      name: q_q2_router

worker:
  type: "Cleaner"
  params:
    field:
      - "timestamp"
      - "dest"
      - "format"
  query: 2
  sync_eof:
    - retries_base_delay: 0.5
    - retries_step_delay: 0.5
    - max_retries: 5
