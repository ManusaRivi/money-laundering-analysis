# q-e example (queue -> exchange)

rabbitmq:
  type: q-e
  url: amqp://guest:guest@rabbitmq:5672/
  input: tx_1
  output: agg
  exchange_type: direct
  # Optional override; otherwise built from NEXT_WORKER_PREFIX/NEXT_WORKER_AMOUNT
  # output_keys:
  #   - agg_0
  #   - agg_1
  prefetch: 30
  durable: true
  auto_delete: false
  exclusive: false
  no_wait: false
  internal: false

worker:
  type: SyncAmountFilter
  params:
    type: amount
    field: Amount
    operator: lt
    value_float: 50

# Required envs if output_keys are omitted
# NEXT_WORKER_PREFIX=agg
# NEXT_WORKER_AMOUNT=2
# WORKER_PREFIX=tx_1
