# q-e example (queue -> exchange)

broker:
  type: q-e
  url: amqp://guest:guest@rabbitmq:5672/
  input: tx_1
  output: agg
  exchange_type: direct
  # El routing key lo decide el worker (RoutingKey en el broker.Message)
  prefetch: 30
  durable: true
  auto_delete: false
  exclusive: false
  no_wait: false
  internal: false

worker:
  type: SyncAmountFilter
  params:
    type: amount
    field: Amount
    operator: lt
    value_float: 50

# Required envs if output is omitted
# NEXT_WORKER_PREFIX=agg
# WORKER_PREFIX=tx_1
