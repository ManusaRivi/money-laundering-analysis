# e-e example (exchange -> exchange)

broker:
  type: e-e
  url: amqp://guest:guest@rabbitmq:5672/
  input: agg
  output: join
  exchange_type: direct
  # Optional override; otherwise built from WORKER_PREFIX/ID
  # input_keys:
  #   - agg_0
  # El routing key de salida lo decide el worker (RoutingKey en el broker.Message)
  prefetch: 30
  durable: true
  auto_delete: false
  exclusive: false
  no_wait: false
  internal: false

worker:
  type: SyncAmountFilter
  params:
    type: amount
    field: Amount
    operator: lt
    value_float: 50

# Required envs if input is omitted
# WORKER_PREFIX=agg
# ID=0
# NEXT_WORKER_PREFIX=join
