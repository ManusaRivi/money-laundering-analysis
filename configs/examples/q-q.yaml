# q-q example (queue -> queue)
# Names can be provided here or derived from env.

rabbitmq:
  type: q-q
  url: amqp://guest:guest@rabbitmq:5672/
  input: tx_1
  output: tx_2
  exchange_type: direct
  prefetch: 30
  durable: true
  auto_delete: false
  exclusive: false
  no_wait: false
  internal: false

worker:
  type: SyncAmountFilter
  params:
    type: amount
    field: Amount
    operator: lt
    value_float: 50

# Optional envs used when input/output are omitted
# WORKER_PREFIX=tx_1
# NEXT_WORKER_PREFIX=tx_2
# ID=0
# NEXT_WORKER_AMOUNT=3
