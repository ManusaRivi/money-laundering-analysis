# e-q example (exchange -> queue)

rabbitmq:
  type: e-q
  url: amqp://guest:guest@rabbitmq:5672/
  input: agg
  output: tx_2
  exchange_type: direct
  # Optional override; otherwise built from WORKER_PREFIX/ID
  # input_keys:
  #   - agg_0
  prefetch: 30
  durable: true
  auto_delete: false
  exclusive: false
  no_wait: false
  internal: false

worker:
  type: SyncAmountFilter
  params:
    type: amount
    field: Amount
    operator: lt
    value_float: 50

# Required envs if input_keys are omitted
# WORKER_PREFIX=agg
# ID=0
# NEXT_WORKER_PREFIX=tx_2
